name: Nightly Transcript Evaluation

on:
  schedule:
    # Runs at 2:00 AM Eastern (7:00 AM UTC) every day
    - cron: "0 7 * * *"
  workflow_dispatch:   # allows you to click "Run workflow" manually anytime

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipeline.py

      - name: Copy dashboard to docs/ for GitHub Pages
        run: |
          mkdir -p docs
          cp CVO_PERF_Intelligence_Dashboard.html docs/index.html

      - name: Commit and push updated dashboard
        run: |
          git config user.name "VetCor Pipeline Bot"
          git config user.email "pipeline@vetcor.com"
          git add docs/index.html
          git add last_run_evaluations.json || true
          git diff --staged --quiet || git commit -m "Update dashboard — $(date +'%Y-%m-%d %H:%M')"
          git push

